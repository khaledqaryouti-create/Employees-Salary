sonar.projectKey=khaledqaryouti-create_Employees-Salary
sonar.organization=khaledqaryouti-create

# Project metadata
sonar.projectName=Employees Salary – Payroll System
sonar.projectVersion=1.0

# Source files
sonar.sources=src
sonar.tests=src
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx

# Exclusions — generated code, static assets, config files
sonar.exclusions=\
  **/node_modules/**,\
  **/.next/**,\
  **/prisma/migrations/**,\
  **/*.config.js,\
  **/*.config.ts,\
  **/public/**,\
  **/*.d.ts

# Language
sonar.sourceEncoding=UTF-8

# Coverage report (generated by vitest --coverage)
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# TypeScript-specific
sonar.typescript.tsconfigPath=tsconfig.json
